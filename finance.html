<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #0a0d10; font-family: 'IBM Plex Mono', monospace; color: #f0a500; }
    * { box-sizing: border-box; }
    ::selection { background: #f0a500; color: #0a0d10; }
    @keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }
    @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100vh); } }
    @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 50;

</head>
<body class="crt">
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" data-presets="env,react">
// Shared shell: top nav, command palette (⌘K / Ctrl+K), now-indicator, konami easter egg.
// These are meant to feel consistent across every section of zymstar.com
// while per-section content uses its own aesthetic underneath.

const IS_MAC = typeof navigator !== 'undefined' && /Mac|iPhone|iPad/.test(navigator.platform || navigator.userAgent || '');
const MOD_KEY = IS_MAC ? '⌘' : 'Ctrl';

const SECTIONS = [
  { id: 'finance',     label: 'Finance',     hue: 140, desc: 'quant, strategies, indicators, backtests', group: 'project' },
  { id: 'hardware',    label: 'Hardware',    hue: 20,  desc: 'FPGA, Arduino, solder smoke', group: 'project' },
  { id: 'ml',          label: 'ML / AI',     hue: 180, desc: 'models, experiments, results', group: 'project' },
  { id: 'dumdum',      label: 'Dumdum',      hue: 330, desc: 'silly ideas with no justification' },
  { id: 'thesis',      label: 'Thesis',      hue: 240, desc: "master's thesis + related work" },
  { id: 'writing',     label: 'Writing',     hue: 40,  desc: 'essays, blog posts, notes' },
  { id: 'vlog',        label: 'Vlog',        hue: 350, desc: 'video, voice, vibes' },
  { id: 'photography', label: 'Photography', hue: 200, desc: 'images, light, composition' },
  { id: 'reading',     label: 'Reading',     hue: 100, desc: 'what I am reading now + shelf' },
  { id: 'tools',       label: 'Tools',       hue: 160, desc: 'utilities I made for myself' },
  { id: 'cv',          label: 'CV',          hue: 0,   desc: 'resume, work history' },
  { id: 'guestbook',   label: 'Guestbook',   hue: 60,  desc: 'leave a note, see the counter' },
];

function TopNav({ theme = 'cosmic', onOpenPalette }) {
  const fg = theme === 'cosmic' ? 'rgba(230,225,255,0.92)' : 'rgba(20,20,30,0.9)';
  const dim = theme === 'cosmic' ? 'rgba(230,225,255,0.55)' : 'rgba(20,20,30,0.55)';
  const border = theme === 'cosmic' ? 'rgba(167,139,250,0.15)' : 'rgba(0,0,0,0.08)';
  const bg = theme === 'cosmic' ? 'rgba(10,14,39,0.55)' : 'rgba(255,255,255,0.75)';
  return (
    <nav style={{
      position: 'absolute', top: 0, left: 0, right: 0, zIndex: 20,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      padding: '18px 32px',
      fontFamily: 'Inter, system-ui, sans-serif',
      fontSize: 13, color: fg,
      backdropFilter: 'blur(12px)',
      WebkitBackdropFilter: 'blur(12px)',
      background: bg,
      borderBottom: `1px solid ${border}`,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
        <div style={{
          width: 22, height: 22, borderRadius: '50%',
          background: 'radial-gradient(circle at 35% 30%, #fff 0%, #c084fc 40%, #6d28d9 90%)',
          boxShadow: '0 0 18px rgba(167,139,250,0.7)',
        }}></div>
        <span style={{
          fontFamily: '"Space Grotesk", Inter, sans-serif',
          fontWeight: 600, fontSize: 16, letterSpacing: '-0.02em',
        }}>zymstar</span>
        <span style={{ color: dim, fontSize: 11, fontFamily: 'JetBrains Mono, monospace' }}>
          / Zeynep&nbsp;Yıldız
        </span>
      </div>

      <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
        <MusicTicker theme={theme} />
        <NowIndicator theme={theme} />
        <button
          onClick={onOpenPalette}
          style={{
            display: 'flex', alignItems: 'center', gap: 8,
            padding: '6px 12px', borderRadius: 8,
            background: 'transparent',
            border: `1px solid ${border}`,
            color: dim, cursor: 'pointer',
            fontFamily: 'JetBrains Mono, monospace', fontSize: 11,
          }}>
          <span>search</span>
          <kbd style={{
            fontFamily: 'JetBrains Mono, monospace',
            padding: '2px 6px', borderRadius: 4,
            background: theme === 'cosmic' ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)',
            fontSize: 10,
          }}>{MOD_KEY}&nbsp;K</kbd>
        </button>
      </div>
    </nav>
  );
}

function NowIndicator({ theme }) {
  // Realtime-ish "what I'm doing now" indicator. Cycles through states.
  const states = [
    { icon: '●', text: 'coding — thesis chapter 3', color: 'oklch(70% 0.15 150)' },
    { icon: '☕', text: 'coffee #3 today',     color: 'oklch(70% 0.15 50)'  },
    { icon: '✎', text: 'writing — on failure', color: 'oklch(70% 0.15 220)' },
    { icon: '✦', text: 'reading — borges',     color: 'oklch(70% 0.15 280)' },
  ];
  const [i, setI] = React.useState(0);
  React.useEffect(() => {
    const t = setInterval(() => setI(x => (x + 1) % states.length), 4200);
    return () => clearInterval(t);
  }, []);
  const s = states[i];
  const dim = theme === 'cosmic' ? 'rgba(230,225,255,0.75)' : 'rgba(20,20,30,0.75)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 8,
      fontFamily: 'JetBrains Mono, monospace', fontSize: 11, color: dim,
    }}>
      <span style={{
        color: s.color,
        animation: 'zs-pulse 1.4s ease-in-out infinite',
        fontSize: 10,
      }}>{s.icon}</span>
      <span style={{ minWidth: 170 }}>
        <span style={{ opacity: 0.55 }}>now: </span>{s.text}
      </span>
    </div>
  );
}

const TRACKS = [
  { t: 'Amaze Amaze Amaze',   a: 'Daniel Pemberton',   c: '#ff6b9d' },
  { t: 'Time Go Fishing',     a: 'Daniel Pemberton',   c: '#4fb8ff' },
  { t: 'See You Tomorrow',    a: 'John Powell',        c: '#7d6cff' },
  { t: "Forbidden Friendship",a: 'John Powell',        c: '#5fd9c4' },
  { t: "It's OK I'm OK",      a: 'Tate McRae',         c: '#ff8aae' },
  { t: 'Non-Stop',            a: 'Lin-Manuel Miranda', c: '#ffb84d' },
  { t: 'Spider-Man Loves You',a: 'Daniel Pemberton',   c: '#e84545' },
  { t: 'What It Sounds Like', a: 'HUNTR/X',            c: '#c084fc' },
  { t: "How It's Done",       a: 'HUNTR/X',            c: '#a855f7' },
  { t: 'No Time For Caution', a: 'Hans Zimmer',        c: '#3a86ff' },
  { t: 'The Seed',            a: 'AURORA',             c: '#06d6a0' },
  { t: 'The Other Side',      a: 'Hugh Jackman',       c: '#ffd23f' },
  { t: 'Cross My Heart',      a: 'Marianas Trench',    c: '#fb5607' },
  { t: 'Desperate Measures',  a: 'Marianas Trench',    c: '#ff006e' },
];

function MusicTicker({ theme }) {
  const [i, setI] = React.useState(() => Math.floor(Math.random() * TRACKS.length));
  const [bars, setBars] = React.useState([0.4, 0.7, 0.5, 0.8]);
  React.useEffect(() => {
    const t = setInterval(() => setI(x => (x + 1) % TRACKS.length), 6800);
    return () => clearInterval(t);
  }, []);
  React.useEffect(() => {
    const t = setInterval(() => {
      setBars(Array.from({ length: 4 }, () => 0.25 + Math.random() * 0.75));
    }, 220);
    return () => clearInterval(t);
  }, []);
  const tr = TRACKS[i];
  const dim = theme === 'cosmic' ? 'rgba(230,225,255,0.75)' : 'rgba(20,20,30,0.75)';
  const subdim = theme === 'cosmic' ? 'rgba(230,225,255,0.45)' : 'rgba(20,20,30,0.45)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 10,
      padding: '4px 10px', borderRadius: 20,
      background: theme === 'cosmic' ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)',
      border: theme === 'cosmic' ? '1px solid rgba(167,139,250,0.18)' : '1px solid rgba(0,0,0,0.08)',
      fontFamily: 'JetBrains Mono, monospace', fontSize: 11, color: dim,
      maxWidth: 280, overflow: 'hidden',
    }}>
      {/* equalizer bars */}
      <div style={{ display: 'flex', alignItems: 'flex-end', gap: 2, height: 14, flexShrink: 0 }}>
        {bars.map((h, j) => (
          <div key={j} style={{
            width: 2, height: `${h * 14}px`,
            background: tr.c, borderRadius: 1,
            transition: 'height .2s',
          }}></div>
        ))}
      </div>
      <div style={{
        display: 'flex', flexDirection: 'column', minWidth: 0, overflow: 'hidden', flex: 1,
        lineHeight: 1.2,
      }}>
        <span style={{
          color: dim, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
          fontSize: 11, fontWeight: 500,
        }}>{tr.t}</span>
        <span style={{
          color: subdim, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
          fontSize: 9.5,
        }}>{tr.a}</span>
      </div>
    </div>
  );
}

function CommandPalette({ open, onClose, onPick }) {
  const [q, setQ] = React.useState('');
  const inputRef = React.useRef(null);
  React.useEffect(() => {
    if (open && inputRef.current) {
      setQ('');
      setTimeout(() => inputRef.current?.focus(), 10);
    }
  }, [open]);
  React.useEffect(() => {
    if (!open) return;
    const onKey = (e) => {
      if (e.key === 'Escape') onClose();
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open, onClose]);

  const results = SECTIONS.filter(s =>
    !q || s.label.toLowerCase().includes(q.toLowerCase()) ||
          s.desc.toLowerCase().includes(q.toLowerCase()));

  if (!open) return null;
  return (
    <div
      onClick={onClose}
      style={{
        position: 'absolute', inset: 0, zIndex: 100,
        background: 'rgba(5,3,20,0.55)',
        backdropFilter: 'blur(6px)',
        display: 'flex', alignItems: 'flex-start', justifyContent: 'center',
        paddingTop: 120,
      }}>
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          width: 'min(540px, 90%)',
          background: 'rgba(16,12,32,0.95)',
          border: '1px solid rgba(167,139,250,0.3)',
          borderRadius: 14,
          boxShadow: '0 30px 80px rgba(0,0,0,0.5)',
          overflow: 'hidden',
          fontFamily: 'Inter, sans-serif',
        }}>
        <div style={{
          display: 'flex', alignItems: 'center', gap: 10,
          padding: '14px 18px',
          borderBottom: '1px solid rgba(167,139,250,0.15)',
        }}>
          <span style={{
            fontFamily: 'JetBrains Mono, monospace',
            color: 'oklch(75% 0.15 290)', fontSize: 13,
          }}>▸</span>
          <input
            ref={inputRef}
            value={q}
            onChange={(e) => setQ(e.target.value)}
            placeholder="jump to section, project, or idea…"
            style={{
              flex: 1, background: 'transparent', border: 'none', outline: 'none',
              color: 'rgba(230,225,255,0.95)', fontSize: 15,
              fontFamily: 'Inter, sans-serif',
            }}
          />
          <kbd style={{
            fontFamily: 'JetBrains Mono, monospace', fontSize: 10,
            color: 'rgba(230,225,255,0.5)',
            padding: '3px 7px', borderRadius: 4,
            background: 'rgba(255,255,255,0.06)',
          }}>esc</kbd>
        </div>
        <div style={{ maxHeight: 360, overflowY: 'auto' }}>
          {results.length === 0 && (
            <div style={{ padding: 24, color: 'rgba(230,225,255,0.5)', fontSize: 13 }}>
              nothing here. maybe it's a dumdum idea waiting to happen.
            </div>
          )}
          {results.map((s, i) => (
            <button
              key={s.id}
              onClick={() => { onPick?.(s); onClose(); }}
              style={{
                display: 'flex', alignItems: 'center', gap: 14, width: '100%',
                padding: '10px 18px', background: 'transparent',
                border: 'none', cursor: 'pointer', textAlign: 'left',
                color: 'rgba(230,225,255,0.9)',
                fontFamily: 'Inter, sans-serif', fontSize: 14,
                transition: 'background .12s',
              }}
              onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(167,139,250,0.1)'}
              onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}
            >
              <span style={{
                width: 8, height: 8, borderRadius: '50%',
                background: `oklch(70% 0.16 ${s.hue})`,
                boxShadow: `0 0 10px oklch(70% 0.16 ${s.hue} / 0.6)`,
              }}></span>
              <span style={{ fontWeight: 500, minWidth: 110 }}>{s.label}</span>
              <span style={{
                color: 'rgba(230,225,255,0.45)', fontSize: 12,
                fontFamily: 'JetBrains Mono, monospace',
              }}>{s.desc}</span>
            </button>
          ))}
        </div>
        <div style={{
          padding: '10px 18px',
          borderTop: '1px solid rgba(167,139,250,0.15)',
          display: 'flex', gap: 14,
          fontFamily: 'JetBrains Mono, monospace', fontSize: 10,
          color: 'rgba(230,225,255,0.4)',
        }}>
          <span>↑↓ navigate</span>
          <span>↵ open</span>
          <span>esc close</span>
          <span style={{ marginLeft: 'auto' }}>{MOD_KEY} K anywhere</span>
        </div>
      </div>
    </div>
  );
}

function useCommandPalette() {
  const [open, setOpen] = React.useState(false);
  React.useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        setOpen(o => !o);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);
  return { open, setOpen };
}

// Konami easter egg — ↑↑↓↓←→←→ba. Flips the page briefly and shows a message.
function useKonami(onTrigger) {
  React.useEffect(() => {
    const seq = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
    let i = 0;
    const onKey = (e) => {
      const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
      if (k === seq[i]) {
        i++;
        if (i === seq.length) { onTrigger?.(); i = 0; }
      } else {
        i = k === seq[0] ? 1 : 0;
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onTrigger]);
}

// Starfield background for cosmic theme. Lightweight; pure CSS-positioned divs.
function Starfield({ density = 100, twinkle = true }) {
  const stars = React.useMemo(() => {
    return Array.from({ length: density }, (_, i) => ({
      id: i,
      x: Math.random() * 100,
      y: Math.random() * 100,
      size: Math.random() * 1.6 + 0.4,
      delay: Math.random() * 3,
      dur: Math.random() * 3 + 2,
      opacity: Math.random() * 0.6 + 0.2,
    }));
  }, [density]);
  return (
    <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', overflow: 'hidden' }}>
      {stars.map(s => (
        <div key={s.id} style={{
          position: 'absolute',
          left: `${s.x}%`, top: `${s.y}%`,
          width: s.size, height: s.size, borderRadius: '50%',
          background: '#fff',
          opacity: s.opacity,
          animation: twinkle ? `zs-twinkle ${s.dur}s ease-in-out ${s.delay}s infinite` : 'none',
        }}></div>
      ))}
    </div>
  );
}

Object.assign(window, { TopNav, NowIndicator, MusicTicker, CommandPalette, useCommandPalette, useKonami, Starfield, SECTIONS });

</script>
  <script type="text/babel" data-presets="env,react">
// Section scaffold — shared layout for every section page.
// Provides: consistent top nav, command palette with routing, back-to-home link,
// fonts preloaded. Each section wraps its content in <SectionFrame>.

// Route a section id to its html file.
function routeToSection(id) {
  // Map any special cases here. Default: {id}.html
  if (id === 'home' || id === 'constellation') { window.location.href = 'index.html'; return; }
  window.location.href = `${id}.html`;
}

function SectionFrame({ sectionId, theme = 'cosmic', background, children }) {
  const palette = useCommandPalette();
  const [konami, setKonami] = React.useState(false);
  useKonami(() => { setKonami(true); setTimeout(() => setKonami(false), 2500); });

  return (
    <div style={{
      position: 'relative', minHeight: '100vh', overflow: 'hidden auto',
      background: background || '#0a0e27',
      color: '#e9e6ff', fontFamily: 'Inter, sans-serif',
    }}>
      <TopNav theme={theme} onOpenPalette={() => palette.setOpen(true)} />
      <CommandPalette
        open={palette.open}
        onClose={() => palette.setOpen(false)}
        onPick={(s) => routeToSection(s.id)}
      />
      <div style={{ paddingTop: 68 }}>
        {children}
      </div>
      {konami && (
        <div style={{
          position: 'fixed', inset: 0, zIndex: 500,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          background: 'rgba(0,0,0,0.85)',
          fontFamily: 'JetBrains Mono, monospace', fontSize: 32, color: '#fff',
          letterSpacing: '0.1em', pointerEvents: 'none',
        }}>
          ⬆⬆⬇⬇⬅➡⬅➡BA · hi there nerd 👾
        </div>
      )}
      <SectionFooter sectionId={sectionId} />
    </div>
  );
}

function SectionFooter({ sectionId }) {
  const idx = SECTIONS.findIndex(s => s.id === sectionId);
  const prev = idx > 0 ? SECTIONS[idx - 1] : null;
  const next = idx >= 0 && idx < SECTIONS.length - 1 ? SECTIONS[idx + 1] : null;
  return (
    <footer style={{
      borderTop: '1px solid rgba(255,255,255,0.06)',
      padding: '28px 56px 40px',
      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      fontFamily: 'JetBrains Mono, monospace', fontSize: 11,
      letterSpacing: '0.15em', color: 'rgba(255,255,255,0.35)',
      gap: 12, flexWrap: 'wrap',
    }}>
      <a href="index.html" style={footerLink}>← BACK TO CONSTELLATION</a>
      <span style={{ color: 'rgba(255,255,255,0.2)' }}>zymstar · Zeynep Yıldız · {new Date().getFullYear()}</span>
      <div style={{ display: 'flex', gap: 16 }}>
        {prev && <a href={`${prev.id}.html`} style={footerLink}>← /{prev.id}</a>}
        {next && <a href={`${next.id}.html`} style={footerLink}>/{next.id} →</a>}
      </div>
    </footer>
  );
}

const footerLink = {
  color: 'rgba(255,255,255,0.5)', textDecoration: 'none',
  letterSpacing: '0.15em', fontSize: 11,
};

Object.assign(window, { SectionFrame, routeToSection });

</script>

      { ticker: 'ZYM/CRD-RG', name: 'credit risk, regime-aware', status: 'COLD',     ret: 2.1,  dd: -22.0, sharpe: 0.31, win: 49, asset: 'CREDIT',stack: 'sklearn' },
    ];

    const INDICATORS = [
      { id: 'IND-001', name: 'fractal-RSI',     desc: 'self-similar momentum across 3 timeframes', tf: 'multi', lang: 'python', state: 'shipped' },
      { id: 'IND-002', name: 'regime detector',  desc: 'HMM tagging trend / chop / crisis',         tf: 'daily', lang: 'python', state: 'shipped' },
      { id: 'IND-003', name: 'liquidity ribbons',desc: 'order-book pressure visualization',          tf: '1m',    lang: 'pine',   state: 'idea'    },
      { id: 'IND-004', name: 'sentiment delta',  desc: 'analyst revision velocity',                  tf: 'daily', lang: 'python', state: 'wip'     },
    ];

    const TICKER_FEED = [
      'ZYM/MOM-01 +0.42%', 'SPY 521.34 +0.18%', 'BTC 67,420 -1.2%',
      'ZYM/MR-02 +0.11%', 'EUR/USD 1.0843', 'VIX 14.2 -3.1%',
      'ZYM/VOL-03 +0.27%', 'TLT 92.10 +0.4%', 'GOLD 2,341 +0.6%',
      'ZYM/OPT-G +0.18%', 'NVDA 884.22 +1.9%', 'ZYM/EARN-1 -0.04%',
    ];

    const STATUS_COLORS = {
      LIVE:     TERM_GREEN,
      PAPER:    TERM_AMBER,
      BACKTEST: '#5fb8d9',
      IDEA:     '#9a7fce',
      COLD:     '#7a7a7a',
    };

    function FinancePage() {
      const [now, setNow] = React.useState(new Date());
      const [selected, setSelected] = React.useState(0);
      React.useEffect(() => {
        const t = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(t);
      }, []);
      const sel = STRATEGIES[selected];

      return (
        <SectionFrame sectionId="finance" theme="dark" background={TERM_BG}>
          {/* Top status bar */}
          <div style={{
            display: 'flex', alignItems: 'center', gap: 24,
            padding: '8px 24px',
            borderBottom: `1px solid ${TERM_DIM}`,
            background: '#070a0c',
            fontSize: 11, color: TERM_AMBER, letterSpacing: '0.08em',
          }}>
            <span style={{ color: TERM_GREEN }}>● ONLINE</span>
            <span>ZYMSTAR/FIN-DESK</span>
            <span style={{ color: TERM_DIM }}>USER: zeynep</span>
            <span style={{ color: TERM_DIM }}>SES: a44f-91c2</span>
            <span style={{ marginLeft: 'auto', color: TERM_AMBER }}>{now.toUTCString().slice(5, 25)} UTC</span>
            <span style={{ color: TERM_DIM }}>v0.3.1</span>
          </div>

          {/* Ticker tape */}
          <div style={{
            overflow: 'hidden', whiteSpace: 'nowrap',
            padding: '6px 0', background: '#070a0c',
            borderBottom: `1px solid ${TERM_DIM}`,
            fontSize: 12, color: TERM_AMBER, letterSpacing: '0.06em',
          }}>
            <div style={{ display: 'inline-flex', gap: 32, animation: 'ticker 60s linear infinite' }}>
              {[...TICKER_FEED, ...TICKER_FEED].map((s, i) => {
                const up = s.includes('+'), down = s.includes('-');
                return (
                  <span key={i} style={{
                    color: up ? TERM_GREEN : down ? TERM_RED : TERM_AMBER,
                  }}>► {s}</span>
                );
              })}
            </div>
          </div>

          <div style={{ padding: '20px 24px 60px' }}>
            {/* Header */}
            <div style={{
              display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end',
              marginBottom: 22, paddingBottom: 14, borderBottom: `1px dashed ${TERM_DIM}`,
            }}>
              <div>
                <div style={{ fontSize: 11, color: TERM_DIM, letterSpacing: '0.3em', marginBottom: 6 }}>
                  /FIN/STRATEGIES &amp; INDICATORS · &lt;F1&gt; HELP · &lt;F8&gt; EXPORT
                </div>
                <h1 style={{
                  fontFamily: 'IBM Plex Mono, monospace',
                  fontSize: 56, fontWeight: 700, letterSpacing: '-0.02em',
                  color: TERM_AMBER, margin: 0,
                  textShadow: `0 0 20px ${TERM_AMBER}50`,
                }}>FIN-DESK<span style={{ animation: 'blink 1.2s infinite', marginLeft: 4 }}>_</span></h1>
              </div>
              <div style={{ textAlign: 'right', fontSize: 11, color: TERM_DIM, lineHeight: 1.7 }}>
                {STRATEGIES.length} STRATEGIES · {INDICATORS.length} INDICATORS<br/>
                <span style={{ color: TERM_AMBER }}>quant lab · personal</span>
              </div>
            </div>

            {/* 3-col layout */}
            <div style={{
              display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 16, marginBottom: 16,
            }}>
              {/* Strategies grid */}
              <Panel title="STRATEGIES MONITOR · F2">
                <div style={{
                  display: 'grid',
                  gridTemplateColumns: '110px 1fr 70px 60px 60px 56px 56px 60px',
                  fontSize: 11, color: TERM_DIM,
                  padding: '6px 10px',
                  borderBottom: `1px solid ${TERM_DIM}`,
                  letterSpacing: '0.08em',
                }}>
                  <span>TICKER</span><span>NAME</span><span>STATUS</span>
                  <span style={{ textAlign: 'right' }}>RET%</span>
                  <span style={{ textAlign: 'right' }}>DD%</span>
                  <span style={{ textAlign: 'right' }}>SHRP</span>
                  <span style={{ textAlign: 'right' }}>WIN%</span>
                  <span style={{ textAlign: 'right' }}>STACK</span>
                </div>
                {STRATEGIES.map((s, i) => {
                  const ok = s.ret != null;
                  const positive = ok && s.ret > 0;
                  return (
                    <div key={s.ticker}
                      onClick={() => setSelected(i)}
                      style={{
                        display: 'grid',
                        gridTemplateColumns: '110px 1fr 70px 60px 60px 56px 56px 60px',
                        fontSize: 12, padding: '7px 10px', cursor: 'pointer',
                        background: selected === i ? `${TERM_AMBER}18` : 'transparent',
                        borderLeft: `2px solid ${selected === i ? TERM_AMBER : 'transparent'}`,
                        color: TERM_AMBER,
                      }}
                      onMouseEnter={e => { if (selected !== i) e.currentTarget.style.background = `${TERM_AMBER}08`; }}
                      onMouseLeave={e => { if (selected !== i) e.currentTarget.style.background = 'transparent'; }}>
                      <span style={{ color: TERM_AMBER, fontWeight: 600 }}>{s.ticker}</span>
                      <span style={{ color: '#d4d4d4' }}>{s.name}</span>
                      <span style={{ color: STATUS_COLORS[s.status], fontWeight: 600 }}>{s.status}</span>
                      <span style={{ textAlign: 'right', color: ok ? (positive ? TERM_GREEN : TERM_RED) : TERM_DIM }}>
                        {ok ? (positive ? '+' : '') + s.ret.toFixed(1) : '—'}
                      </span>
                      <span style={{ textAlign: 'right', color: ok ? TERM_RED : TERM_DIM }}>
                        {ok ? s.dd.toFixed(1) : '—'}
                      </span>
                      <span style={{ textAlign: 'right', color: ok ? '#d4d4d4' : TERM_DIM }}>
                        {ok ? s.sharpe.toFixed(2) : '—'}
                      </span>
                      <span style={{ textAlign: 'right', color: ok && s.win ? '#d4d4d4' : TERM_DIM }}>
                        {ok && s.win ? s.win : '—'}
                      </span>
                      <span style={{ textAlign: 'right', color: TERM_DIM, fontSize: 10 }}>{s.stack}</span>
                    </div>
                  );
                })}
              </Panel>

              {/* Detail panel */}
              <Panel title={`DETAIL · ${sel.ticker}`}>
                <div style={{ padding: 14 }}>
                  <div style={{ fontSize: 14, color: '#d4d4d4', marginBottom: 14 }}>{sel.name}</div>
                  <KV k="STATUS" v={<span style={{ color: STATUS_COLORS[sel.status] }}>{sel.status}</span>} />
                  <KV k="ASSET CLASS" v={sel.asset} />
                  <KV k="STACK" v={sel.stack} />
                  {sel.ret != null && (
                    <>
                      <div style={{ height: 1, background: TERM_DIM, margin: '12px 0', opacity: 0.4 }}></div>
                      <KV k="RETURN (annl.)" v={<span style={{ color: sel.ret > 0 ? TERM_GREEN : TERM_RED }}>{(sel.ret > 0 ? '+' : '') + sel.ret.toFixed(2) + '%'}</span>} />
                      <KV k="MAX DD" v={<span style={{ color: TERM_RED }}>{sel.dd.toFixed(1)}%</span>} />
                      <KV k="SHARPE" v={sel.sharpe.toFixed(2)} />
                      <KV k="WIN RATE" v={sel.win ? sel.win + '%' : 'n/a'} />
                    </>
                  )}
                  <div style={{ height: 1, background: TERM_DIM, margin: '12px 0', opacity: 0.4 }}></div>
                  {/* mini chart (svg sparkline) */}
                  <div style={{ fontSize: 10, color: TERM_DIM, marginBottom: 4 }}>EQUITY CURVE · y/y</div>
                  <Sparkline seed={selected} positive={sel.ret == null ? null : sel.ret > 0} />
                </div>
              </Panel>
            </div>

            {/* Bottom row: indicators + system feed */}
            <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 16 }}>
              <Panel title="INDICATOR LIBRARY · F3">
                <div style={{ padding: 4 }}>
                  {INDICATORS.map(ind => (
                    <div key={ind.id} style={{
                      display: 'grid', gridTemplateColumns: '70px 1fr 60px 60px 70px',
                      fontSize: 12, padding: '8px 10px',
                      borderBottom: `1px dotted ${TERM_DIM}40`,
                      color: TERM_AMBER,
                    }}>
                      <span style={{ color: TERM_DIM }}>{ind.id}</span>
                      <span>
                        <span style={{ color: TERM_AMBER, fontWeight: 600 }}>{ind.name}</span>
                        <span style={{ color: '#888', marginLeft: 8 }}>// {ind.desc}</span>
                      </span>
                      <span style={{ color: '#d4d4d4', fontSize: 10, textAlign: 'right' }}>{ind.tf}</span>
                      <span style={{ color: '#d4d4d4', fontSize: 10, textAlign: 'right' }}>{ind.lang}</span>
                      <span style={{
                        textAlign: 'right', fontSize: 10, fontWeight: 600,
                        color: ind.state === 'shipped' ? TERM_GREEN : ind.state === 'wip' ? TERM_AMBER : '#9a7fce',
                      }}>{ind.state.toUpperCase()}</span>
                    </div>
                  ))}
                </div>
              </Panel>

              <Panel title="SYSTEM LOG · F9">
                <div style={{ padding: 12, fontSize: 11, lineHeight: 1.8, color: TERM_AMBER }}>
                  {[
                    { t: '14:02:11', msg: 'ZYM/MOM-01 rebalance complete · 0 errors' },
                    { t: '13:48:02', msg: 'data feed: equity_us heartbeat OK' },
                    { t: '13:30:00', msg: 'backtest queued: ZYM/VOL-03 (yr=2024)', warn: true },
                    { t: '13:18:55', msg: 'IND-002 regime → CHOP (was TREND)' },
                    { t: '12:57:31', msg: 'note added: revisit credit-risk after macro shift' },
                    { t: '12:41:09', msg: 'session resumed from prev', dim: true },
                    { t: '—',        msg: 'awaiting input ▮', blink: true },
                  ].map((l, i) => (
                    <div key={i} style={{
                      display: 'flex', gap: 12,
                      color: l.dim ? TERM_DIM : l.warn ? '#5fb8d9' : TERM_AMBER,
                    }}>
                      <span style={{ color: TERM_DIM, width: 64 }}>{l.t}</span>
                      <span style={{ animation: l.blink ? 'blink 1.2s infinite' : 'none' }}>{l.msg}</span>
                    </div>
                  ))}
                </div>
              </Panel>
            </div>

            {/* Footer */}
            <div style={{
              marginTop: 18, padding: '8px 14px',
              borderTop: `1px solid ${TERM_DIM}`,
              display: 'flex', justifyContent: 'space-between',
              fontSize: 10, color: TERM_DIM, letterSpacing: '0.1em',
            }}>
              <span>not financial advice. personal research only. all P&amp;L figures from backtest unless marked LIVE.</span>
              <span style={{ animation: 'blink 1.2s infinite', color: TERM_AMBER }}>READY ▮</span>
            </div>
          </div>
        </SectionFrame>
      );
    }

    function Panel({ title, children }) {
      return (
        <div style={{
          background: PANEL_BG,
          border: `1px solid ${TERM_DIM}`,
          boxShadow: `inset 0 0 30px rgba(240,165,0,0.04)`,
        }}>
          <div style={{
            padding: '6px 12px', background: '#070a0c',
            borderBottom: `1px solid ${TERM_DIM}`,
            fontSize: 10, color: TERM_AMBER, letterSpacing: '0.18em', fontWeight: 700,
            display: 'flex', justifyContent: 'space-between',
          }}>
            <span>▸ {title}</span>
            <span style={{ color: TERM_DIM }}>[ ─ □ × ]</span>
          </div>
          {children}
        </div>
      );
    }

    function KV({ k, v }) {
      return (
        <div style={{
          display: 'grid', gridTemplateColumns: '110px 1fr', gap: 10,
          fontSize: 12, padding: '3px 0',
          color: '#d4d4d4',
        }}>
          <span style={{ color: TERM_DIM, letterSpacing: '0.08em', fontSize: 11 }}>{k}</span>
          <span>{v}</span>
        </div>
      );
    }

    function Sparkline({ seed = 0, positive }) {
      // Deterministic pseudo-random walk so each strategy has a stable curve.
      const N = 60;
      let v = 100, vals = [];
      const rng = (i) => Math.sin((seed + 1) * 9.13 + i * 1.7) * 0.5 + Math.sin((seed + 1) * 4.44 + i * 0.7);
      for (let i = 0; i < N; i++) {
        const trend = positive == null ? 0 : positive ? 0.18 : -0.12;
        v += rng(i) * 1.4 + trend;
        vals.push(v);
      }
      const min = Math.min(...vals), max = Math.max(...vals);
      const range = max - min || 1;
      const w = 280, h = 70;
      const points = vals.map((y, i) => `${(i / (N - 1)) * w},${h - ((y - min) / range) * (h - 8) - 4}`).join(' ');
      const stroke = positive == null ? TERM_DIM : positive ? TERM_GREEN : TERM_RED;
      return (
        <svg viewBox={`0 0 ${w} ${h}`} width="100%" style={{ display: 'block' }}>
          {/* grid */}
          {[0, 0.25, 0.5, 0.75, 1].map(p => (
            <line key={p} x1={0} x2={w} y1={p * h} y2={p * h}
              stroke={TERM_DIM} strokeOpacity={0.2} strokeDasharray="2 4" />
          ))}
          <polyline points={points} fill="none" stroke={stroke} strokeWidth="1.5" />
          <polyline points={`${points} ${w},${h} 0,${h}`} fill={stroke} fillOpacity={0.08} />
        </svg>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<FinancePage />);
  </script>
</body>
</html>
