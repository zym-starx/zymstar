<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>zymstar / repos</title>
  <style>
    html, body { margin: 0; padding: 0; background: #0d1117; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; color: #c9d1d9; }
    * { box-sizing: border-box; }
    ::selection { background: #388bfd; color: #fff; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" data-presets="env,react">
const IS_MAC = typeof navigator !== 'undefined' && /Mac|iPhone|iPad/.test(navigator.platform || navigator.userAgent || '');
const MOD_KEY = IS_MAC ? '⌘' : 'Ctrl';
const MONO = 'ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace';

const SECTIONS = [
  { id: 'finance',     label: 'Finance',     hue: 140, desc: 'quant, strategies, indicators, backtests', group: 'project' },
  { id: 'hardware',    label: 'Hardware',    hue: 20,  desc: 'FPGA, Arduino, solder smoke', group: 'project' },
  { id: 'ml',          label: 'ML / AI',     hue: 180, desc: 'models, experiments, results', group: 'project' },
  { id: 'dumdum',      label: 'Dumdum',      hue: 330, desc: 'idea index — things I might build or film' },
  { id: 'thesis',      label: 'Thesis',      hue: 240, desc: "master's thesis + related work" },
  { id: 'writing',     label: 'Writing',     hue: 40,  desc: 'essays, blog posts, notes' },
  { id: 'vlog',        label: 'Vlog',        hue: 350, desc: 'video, voice, vibes' },
  { id: 'photography', label: 'Photography', hue: 200, desc: 'images, light, composition' },
  { id: 'reading',     label: 'Reading',     hue: 100, desc: 'what I am reading now + shelf' },
  { id: 'repos',       label: 'Repos',       hue: 160, desc: 'github repos — experiments & side code', group: 'project' },
  { id: 'cv',          label: 'CV',          hue: 0,   desc: 'resume, work history' },
  { id: 'guestbook',   label: 'Guestbook',   hue: 60,  desc: 'leave a note, see the counter' },
];

function TopNav({ theme = 'cosmic', onOpenPalette }) {
  const fg = theme === 'cosmic' ? 'rgba(230,225,255,0.92)' : 'rgba(201,209,217,0.95)';
  const dim = theme === 'cosmic' ? 'rgba(230,225,255,0.55)' : 'rgba(139,148,158,0.9)';
  const border = theme === 'cosmic' ? 'rgba(167,139,250,0.15)' : 'rgba(48,54,61,0.8)';
  const bg = theme === 'cosmic' ? 'rgba(10,14,39,0.55)' : 'rgba(13,17,23,0.92)';
  return (
    <nav style={{
      position: 'absolute', top: 0, left: 0, right: 0, zIndex: 20,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      padding: '18px 32px', fontSize: 13, color: fg,
      backdropFilter: 'blur(12px)', WebkitBackdropFilter: 'blur(12px)',
      background: bg, borderBottom: `1px solid ${border}`,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
        <div style={{
          width: 22, height: 22, borderRadius: '50%',
          background: 'radial-gradient(circle at 35% 30%, #fff 0%, #c084fc 40%, #6d28d9 90%)',
          boxShadow: '0 0 18px rgba(167,139,250,0.7)',
        }}></div>
        <span style={{ fontWeight: 600, fontSize: 16, letterSpacing: '-0.02em' }}>zymstar</span>
        <span style={{ color: dim, fontSize: 11, fontFamily: MONO }}>/ Zeynep&nbsp;Yıldız</span>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
        <button onClick={onOpenPalette} style={{
          display: 'flex', alignItems: 'center', gap: 8, padding: '6px 12px', borderRadius: 8,
          background: 'transparent', border: `1px solid ${border}`, color: dim, cursor: 'pointer',
          fontFamily: MONO, fontSize: 11,
        }}>
          <span>search</span>
          <kbd style={{ fontFamily: MONO, padding: '2px 6px', borderRadius: 4, background: 'rgba(255,255,255,0.06)', fontSize: 10 }}>{MOD_KEY}&nbsp;K</kbd>
        </button>
      </div>
    </nav>
  );
}

function CommandPalette({ open, onClose, onPick }) {
  const [q, setQ] = React.useState('');
  const inputRef = React.useRef(null);
  React.useEffect(() => { if (open && inputRef.current) { setQ(''); setTimeout(() => inputRef.current?.focus(), 10); } }, [open]);
  React.useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open, onClose]);
  const results = SECTIONS.filter(s =>
    !q || s.label.toLowerCase().includes(q.toLowerCase()) || s.desc.toLowerCase().includes(q.toLowerCase()));
  if (!open) return null;
  return (
    <div onClick={onClose} style={{ position: 'absolute', inset: 0, zIndex: 100, background: 'rgba(1,4,9,0.7)', display: 'flex', alignItems: 'flex-start', justifyContent: 'center', paddingTop: 120 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ width: 'min(540px, 90%)', background: '#161b22', border: '1px solid #30363d', borderRadius: 12, overflow: 'hidden' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '14px 18px', borderBottom: '1px solid #30363d' }}>
          <input ref={inputRef} value={q} onChange={(e) => setQ(e.target.value)} placeholder="jump to section…"
            style={{ flex: 1, background: 'transparent', border: 'none', outline: 'none', color: '#c9d1d9', fontSize: 15 }} />
        </div>
        <div style={{ maxHeight: 360, overflowY: 'auto' }}>
          {results.map((s) => (
            <button key={s.id} onClick={() => { onPick?.(s); onClose(); }} style={{
              display: 'flex', alignItems: 'center', gap: 14, width: '100%', padding: '10px 18px',
              background: 'transparent', border: 'none', cursor: 'pointer', textAlign: 'left', color: '#c9d1d9', fontSize: 14,
            }}>
              <span style={{ fontWeight: 500, minWidth: 140 }}>{s.label}</span>
              <span style={{ color: '#8b949e', fontSize: 12 }}>{s.desc}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function useCommandPalette() {
  const [open, setOpen] = React.useState(false);
  React.useEffect(() => {
    const onKey = (e) => { if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); setOpen(o => !o); } };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);
  return { open, setOpen };
}

Object.assign(window, { TopNav, CommandPalette, useCommandPalette, SECTIONS });
</script>
  <script type="text/babel" data-presets="env,react">
function routeToSection(id) {
  if (id === 'home' || id === 'constellation') { window.location.href = 'index.html'; return; }
  if (id === 'projects') { window.location.href = 'repos.html'; return; }
  window.location.href = `${id}.html`;
}

function SectionFrame({ sectionId, background, children }) {
  const palette = useCommandPalette();
  return (
    <div style={{ position: 'relative', minHeight: '100vh', overflow: 'hidden auto', background: background || '#0d1117', color: '#c9d1d9' }}>
      <TopNav theme="github" onOpenPalette={() => palette.setOpen(true)} />
      <CommandPalette open={palette.open} onClose={() => palette.setOpen(false)} onPick={(s) => routeToSection(s.id)} />
      <div style={{ paddingTop: 68 }}>{children}</div>
      <SectionFooter sectionId={sectionId} />
    </div>
  );
}

const MONO_STACK = 'ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace';

function SectionFooter({ sectionId }) {
  const idx = SECTIONS.findIndex(s => s.id === sectionId);
  const prev = idx > 0 ? SECTIONS[idx - 1] : null;
  const next = idx >= 0 && idx < SECTIONS.length - 1 ? SECTIONS[idx + 1] : null;
  return (
    <footer style={{ borderTop: '1px solid #21262d', padding: '28px 56px 40px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontFamily: MONO_STACK, fontSize: 12, color: '#8b949e', gap: 12, flexWrap: 'wrap' }}>
      <a href="index.html" style={{ color: '#58a6ff', textDecoration: 'none' }}>← constellation</a>
      <span>zymstar · {new Date().getFullYear()}</span>
      <div style={{ display: 'flex', gap: 16 }}>
        {prev && <a href={`${prev.id}.html`} style={{ color: '#58a6ff', textDecoration: 'none' }}>← {prev.id}</a>}
        {next && <a href={`${next.id}.html`} style={{ color: '#58a6ff', textDecoration: 'none' }}>{next.id} →</a>}
      </div>
    </footer>
  );
}

Object.assign(window, { SectionFrame, routeToSection, MONO_STACK });
</script>
  <script type="text/babel" data-presets="env,react">
    const GITHUB_USER = 'zymyi';
    const PROFILE_URL = `https://github.com/${GITHUB_USER}`;

    const REPOS = [
      { name: 'metronome-that-hates-you', desc: 'tempo drifts when you look at it', lang: 'Rust', langColor: '#dea584', stars: 2, updated: '3 days ago' },
      { name: 'fpga-blink-morse', desc: 'sends SOS until you solder the right pin', lang: 'Verilog', langColor: '#b07219', stars: 1, updated: '1 week ago' },
      { name: 'backtest-on-a-postcard', desc: 'one strategy, one chart, fits in 4kb', lang: 'Python', langColor: '#3572A5', stars: 4, updated: '2 weeks ago' },
      { name: 'latent-space-zine', desc: 'visualizing embeddings as bad collage art', lang: 'TypeScript', langColor: '#3178c6', stars: 0, updated: 'last month' },
      { name: 'guestbook-counter', desc: 'increments. that is the product.', lang: 'JavaScript', langColor: '#f1e05a', stars: 7, updated: 'yesterday' },
    ].map((r) => ({ ...r, url: `https://github.com/${GITHUB_USER}/${r.name}` }));

    const MONO = window.MONO_STACK;
    const totalStars = REPOS.reduce((n, r) => n + (r.stars || 0), 0);

    function RepoBookIcon() {
      return (
        <svg width="16" height="16" viewBox="0 0 16 16" fill="#8b949e" aria-hidden="true">
          <path fillRule="evenodd" d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.348.348 0 01-.11.25zM5.75 12h4.5a.75.75 0 010 1.5h-4.5a.75.75 0 010-1.5zM5 10.25a.75.75 0 01.75-.75h4.5a.75.75 0 010 1.5h-4.5a.75.75 0 01-.75-.75z"/>
        </svg>
      );
    }

    function ReposPage() {
      const [q, setQ] = React.useState('');
      const filtered = REPOS.filter((r) =>
        !q || r.name.includes(q.toLowerCase()) || r.desc.toLowerCase().includes(q.toLowerCase()));

      return (
        <SectionFrame sectionId="repos" background="#0d1117">
          <div style={{ maxWidth: 1012, margin: '0 auto', padding: '24px 24px 80px' }}>
            <div style={{ display: 'grid', gridTemplateColumns: 'minmax(0, 1fr) 296px', gap: 32, alignItems: 'start' }}>
              <div>
                {/* Profile header */}
                <div style={{ display: 'flex', gap: 24, marginBottom: 24, flexWrap: 'wrap' }}>
                  <div style={{
                    width: 280, height: 280, borderRadius: '50%',
                    background: 'linear-gradient(135deg, #161b22 0%, #21262d 50%, #30363d 100%)',
                    border: '1px solid #30363d', flexShrink: 0,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontSize: 96, fontWeight: 300, color: '#8b949e',
                  }}>{GITHUB_USER[0]}</div>
                  <div style={{ flex: 1, minWidth: 200, paddingTop: 16 }}>
                    <h1 style={{ fontSize: 32, fontWeight: 600, margin: '0 0 8px', color: '#f0f6fc' }}>{GITHUB_USER}</h1>
                    <p style={{ fontSize: 20, color: '#8b949e', margin: '0 0 16px', lineHeight: 1.4 }}>
                      side repos & experiments — the spillover from finance, hardware, and ML
                    </p>
                    <a href={PROFILE_URL} target="_blank" rel="noopener noreferrer" style={{
                      display: 'inline-flex', alignItems: 'center', gap: 8,
                      padding: '5px 16px', fontSize: 14, fontWeight: 500,
                      color: '#f0f6fc', background: '#21262d', border: '1px solid #30363d',
                      borderRadius: 6, textDecoration: 'none',
                    }}>
                      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                      View on GitHub
                    </a>
                  </div>
                </div>

                {/* Repositories tab */}
                <div style={{ borderBottom: '1px solid #21262d', marginBottom: 24 }}>
                  <span style={{
                    display: 'inline-block', padding: '8px 4px', marginBottom: -1,
                    fontSize: 14, fontWeight: 600, color: '#f0f6fc',
                    borderBottom: '2px solid #f78166',
                  }}>Repositories</span>
                  <span style={{ marginLeft: 8, fontSize: 14, color: '#8b949e' }}>{REPOS.length}</span>
                </div>

                <div style={{ marginBottom: 16 }}>
                  <input
                    value={q}
                    onChange={(e) => setQ(e.target.value)}
                    placeholder="Find a repository…"
                    style={{
                      width: '100%', maxWidth: 320, padding: '5px 12px',
                      fontSize: 14, color: '#c9d1d9', background: '#0d1117',
                      border: '1px solid #30363d', borderRadius: 6, outline: 'none',
                    }}
                  />
                </div>

                <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                  {filtered.map((r) => (
                    <div key={r.name} style={{
                      padding: 16, border: '1px solid #30363d', borderRadius: 6,
                      background: '#0d1117',
                    }}>
                      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 12, flexWrap: 'wrap' }}>
                        <div style={{ minWidth: 0, flex: 1 }}>
                          <h3 style={{ margin: '0 0 8px', fontSize: 20, fontWeight: 600 }}>
                            <a href={r.url} target="_blank" rel="noopener noreferrer" style={{
                              color: '#58a6ff', textDecoration: 'none', display: 'inline-flex', alignItems: 'center', gap: 6,
                            }}>
                              <RepoBookIcon />
                              {r.name}
                            </a>
                          </h3>
                          <p style={{ margin: 0, fontSize: 14, color: '#8b949e', lineHeight: 1.5 }}>{r.desc}</p>
                        </div>
                        <span style={{
                          padding: '0 7px', fontSize: 12, fontWeight: 500,
                          border: '1px solid #30363d', borderRadius: 12, color: '#8b949e', flexShrink: 0,
                        }}>Public</span>
                      </div>
                      <div style={{
                        display: 'flex', alignItems: 'center', gap: 16, marginTop: 12,
                        fontSize: 12, color: '#8b949e', flexWrap: 'wrap',
                      }}>
                        {r.lang && (
                          <span style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                            <span style={{ width: 12, height: 12, borderRadius: '50%', background: r.langColor }} />
                            {r.lang}
                          </span>
                        )}
                        {r.stars != null && <span>★ {r.stars}</span>}
                        <span>Updated {r.updated}</span>
                      </div>
                    </div>
                  ))}
                  {filtered.length === 0 && (
                    <p style={{ color: '#8b949e', fontSize: 14 }}>No repositories match &ldquo;{q}&rdquo;.</p>
                  )}
                </div>
              </div>

              <aside>
                <h2 style={{ fontSize: 14, fontWeight: 600, margin: '0 0 12px', color: '#f0f6fc' }}>About</h2>
                <p style={{ fontSize: 14, color: '#8b949e', lineHeight: 1.5, margin: '0 0 16px' }}>
                  Curated mirror of my GitHub — each card opens the real repo. Ideas without code live in{' '}
                  <a href="dumdum.html" style={{ color: '#58a6ff', textDecoration: 'none' }}>dumdum</a>.
                </p>
                <div style={{ fontSize: 12, color: '#8b949e', lineHeight: 2.2 }}>
                  <div>🌐 <a href={PROFILE_URL} target="_blank" rel="noopener noreferrer" style={{ color: '#58a6ff', textDecoration: 'none' }}>github.com/{GITHUB_USER}</a></div>
                  <div>⭐ {totalStars} stars across listed repos</div>
                  <div>📦 {REPOS.length} repositories shown</div>
                </div>
                <p style={{
                  marginTop: 20, fontSize: 12, color: '#6e7681', lineHeight: 1.5,
                  borderTop: '1px solid #21262d', paddingTop: 16,
                }}>
                  Edit <code style={{ fontFamily: MONO, fontSize: 11, background: 'rgba(110,118,129,0.2)', padding: '2px 4px', borderRadius: 4 }}>GITHUB_USER</code> and{' '}
                  <code style={{ fontFamily: MONO, fontSize: 11, background: 'rgba(110,118,129,0.2)', padding: '2px 4px', borderRadius: 4 }}>REPOS</code> in repos.html to match your account.
                </p>
              </aside>
            </div>
          </div>
        </SectionFrame>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ReposPage />);
  </script>
</body>
</html>
